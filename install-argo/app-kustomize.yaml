apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: conversao
  namespace: argo-cd
spec:
  project: default
  sources:
    - repoURL: https://github.com/danferreira011/web-page-deploy.git
      targetRevision: HEAD
      path: kustomize
  destination:
    server: https://kubernetes.default.svc
    namespace: conversao