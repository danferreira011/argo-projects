apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/danferreira011/argo-projects.git
    path: argocd
    targetRevision: HEAD
    directory:
      recurse: true      
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd